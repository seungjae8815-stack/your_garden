# Codemagic CI — 너의 정원 iOS (App Store / TestFlight)
#
# ── Codemagic 대시보드 사전 준비 ─────────────────────────────
# 1) Settings → Integrations → Developer Portal: App Store Connect API 키(.p8) 등록.
#    등록 시 정한 '이름'(codemagic)을 아래 integrations.app_store_connect 값과 똑같이 맞추세요.
# 2) 환경변수 그룹 'supabase' 생성 후 아래 2개 추가(‘Secure’ 체크):
#      SUPABASE_URL        = (Supabase 프로젝트 URL)
#      SUPABASE_ANON_KEY   = (Supabase anon key)
#    ※ .env 는 repo에 없으므로(gitignore) 빌드 중 이 값으로 생성함.
# 3) 이 repo(your_garden)를 Codemagic 앱으로 연결.
#
# 참고: Flutter 프로젝트가 서브폴더 your_garden/ 에 있어 스크립트에서 cd 함.

workflows:
  ios-appstore:
    name: iOS App Store (너의 정원)
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: codemagic   # Codemagic Developer Portal에 등록한 App Store Connect API 키 '이름' (소문자 codemagic)
    environment:
      groups:
        - supabase                   # SUPABASE_URL, SUPABASE_ANON_KEY 를 담은 환경변수 그룹
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Create .env (Supabase 키 주입)
        script: |
          cat > "$CM_BUILD_DIR/your_garden/.env" <<EOF
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          EOF
      - name: Flutter pub get
        script: |
          cd "$CM_BUILD_DIR/your_garden"
          flutter pub get
      - name: Set up code signing (프로파일 없으면 자동 생성)
        script: |
          # 인증서·프로파일을 App Store Connect에서 가져오되, 없으면 --create 로 생성.
          # (자동 ios_signing 블록은 "찾기만" 하고 생성을 안 해 첫 빌드에서 실패했음)
          keychain initialize
          app-store-connect fetch-signing-files "com.yourgarden.app" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          cd "$CM_BUILD_DIR/your_garden"
          xcode-project use-profiles
      - name: Flutter build ipa
        script: |
          cd "$CM_BUILD_DIR/your_garden"
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - your_garden/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # 심사까지 자동 제출하려면 아래 주석 해제(그룹 배포 후):
        # submit_to_app_store: false
